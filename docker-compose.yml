version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: metadata_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: metadata_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: metadata_api
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    env_file:
      - .env

volumes:
  postgres_data: